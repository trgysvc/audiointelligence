name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      
      - name: Set Swift Version
        run: swift --version
      
      - name: Build
        run: swift build -v
        
      - name: Run tests
        run: swift test -v
